<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Wishes Surprise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card locked" id="card">

      <div class="background-slider" id="backgroundSlider">
        <img src="images/WhatsApp Image 2026-04-26 at 17.41.38.jpeg" alt="Background 1">
        <img src="images/WhatsApp Image 2026-04-26 at 17.41.39.jpeg" alt="Background 2">
        <img src="images/WhatsApp Image 2026-04-26 at 17.41.40.jpeg" alt="Background 3">
      </div>

      <div class="overlay"></div>

      <div class="particles"></div>

      <div class="form-box" id="formBox">
        <h2>Unlock Birthday Surprise 🎁</h2>
        <p class="hint">Type the secret word to reveal wishes</p>

        <input type="text" id="secretInput" placeholder="Enter Secret Word">

        <button onclick="showWish()">Unlock Wishes</button>
      </div>

      <div class="wish-box" id="wishBox">
        <h1>Happy Birthday Saranya</h1>

        <p>
          Wishing you endless happiness, unforgettable memories,
          and beautiful moments that last forever.
        </p>

        <div class="wish-tag"> Have a Magical Birthday </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
